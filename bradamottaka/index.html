<!doctype html>
<html lang="is">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="robots" content="noindex, nofollow">
  <title>Opna mælaborð | Bráðamóttaka í Fossvogi</title>

  <style>
    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      color: #102033;
      background: #f4f7fa;
    }

    * {
      box-sizing: border-box;
    }

    .page {
      min-height: 100vh;
      display: table;
      width: 100%;
      padding: 24px;
    }

    .page-inner {
      display: table-cell;
      vertical-align: middle;
      text-align: center;
    }

    .card {
      max-width: 560px;
      margin: 0 auto;
      padding: 30px 24px;
      background: #ffffff;
      border: 1px solid #d9e1e8;
      border-radius: 18px;
      box-shadow: 0 16px 45px rgba(16, 32, 51, 0.10);
    }

    .eyebrow {
      margin: 0 0 10px 0;
      color: #4F6F8F;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.15;
    }

    .text {
      margin: 14px 0 0 0;
      color: #5f6f82;
      font-size: 16px;
      line-height: 1.55;
    }

    .button {
      display: inline-block;
      margin-top: 22px;
      padding: 15px 22px;
      border-radius: 14px;
      color: #ffffff;
      background: #4F6F8F;
      font-size: 16px;
      font-weight: 700;
      text-decoration: none;
      box-shadow: 0 10px 24px rgba(79, 111, 143, 0.25);
    }

    .button:hover,
    .button:focus {
      background: #435F7A;
    }

    .small {
      margin-top: 16px;
      color: #7a8795;
      font-size: 13px;
      line-height: 1.45;
    }
  </style>
</head>

<body>
  <main class="page">
    <div class="page-inner">
      <section class="card" aria-labelledby="page-title">
        <p class="eyebrow">Landspítali</p>
        <h1 id="page-title">Bráðamóttaka í Fossvogi</h1>
        <p class="text">
          Augnablik, þú ert send/ur í rétta útgáfu mælaborðsins eftir tæki og skjábreidd.
        </p>

        <!-- Mobile URL is the safe fallback. If JavaScript fails, users still get the mobile version. -->
        <a id="fallback-link" class="button" href="https://app.powerbi.com/view?r=eyJrIjoiNGZlODE2N2ItYzkwZS00ZWYzLTg2YzctMjg5NWY5MmU1NTkyIiwidCI6ImUxMDExZTUyLTcyMTAtNDAxNy05NTBmLTQ1ODA3NWY5Zjg0ZSIsImMiOjh9">
          Opna mælaborð
        </a>

        <p id="route-note" class="small">
          Ef ekkert gerist sjálfkrafa skaltu smella á takkann.
        </p>
      </section>
    </div>
  </main>

  <noscript>
    <meta http-equiv="refresh" content="0;url=https://app.powerbi.com/view?r=eyJrIjoiNGZlODE2N2ItYzkwZS00ZWYzLTg2YzctMjg5NWY5MmU1NTkyIiwidCI6ImUxMDExZTUyLTcyMTAtNDAxNy05NTBmLTQ1ODA3NWY5Zjg0ZSIsImMiOjh9">
  </noscript>

  <script>
    (function () {
      // Bráðamóttaka í Fossvogi: one GitHub Pages router per dashboard.
      // The user should only see one island.is button. This page redirects immediately.

      var DESKTOP_URL = "https://app.powerbi.com/view?r=eyJrIjoiNDU4MjNhOGYtMGM0NS00NDBkLThiM2MtNTA2MDFjNjNkNTliIiwidCI6ImUxMDExZTUyLTcyMTAtNDAxNy05NTBmLTQ1ODA3NWY5Zjg0ZSIsImMiOjh9";
      var MOBILE_URL = "https://app.powerbi.com/view?r=eyJrIjoiNGZlODE2N2ItYzkwZS00ZWYzLTg2YzctMjg5NWY5MmU1NTkyIiwidCI6ImUxMDExZTUyLTcyMTAtNDAxNy05NTBmLTQ1ODA3NWY5Zjg0ZSIsImMiOjh9";
      var MOBILE_BREAKPOINT = 768;

      // Tracking setup.
      // 1. Create an endpoint, for example the Google Apps Script tracker.
      // 2. Paste the deployed web app URL below.
      // 3. Keep TRACKING_ENABLED as true.
      var TRACKING_ENABLED = true;
      var TRACKING_ENDPOINT = "https://script.google.com/macros/s/AKfycbxRoNEQwlxQUpxEMGzYizAB0_lP1MdqksGLu4fD7c94rzqUul3MW2_E9VCqeRzLK3wD/exec";
      var TRACK_DEBUG_VISITS = false; // false keeps ?debug=1 tests out of the count.
      var ROUTER_CORE_VERSION = "2026-06-10-router-v1";
      var CONFIG_VERSION = "2026-06-10-prod-v1";
      var DASHBOARD_KEY = "bradamottaka";
      var DASHBOARD_ID = "bradamottakan-fossvogi";
      var DASHBOARD_NAME = "Bráðamóttaka í Fossvogi";
      var PUBLIC_CARD_TITLE = "Bráðamóttaka í Fossvogi";
      var PUBLIC_ENTRY_PAGE = "/s/landspitali/maelabord";

      function getUserAgent() {
        return navigator.userAgent || navigator.vendor || window.opera || "";
      }

      function getViewportWidth() {
        var width = window.innerWidth || 0;
        var docWidth = 0;

        if (document.documentElement && document.documentElement.clientWidth) {
          docWidth = document.documentElement.clientWidth;
        }

        if (width && docWidth) {
          return Math.min(width, docWidth);
        }

        return width || docWidth || screen.width || 1024;
      }

      function getViewportHeight() {
        var height = window.innerHeight || 0;
        var docHeight = 0;

        if (document.documentElement && document.documentElement.clientHeight) {
          docHeight = document.documentElement.clientHeight;
        }

        if (height && docHeight) {
          return Math.min(height, docHeight);
        }

        return height || docHeight || screen.height || 768;
      }

      function hasTouch() {
        return !!("ontouchstart" in window) || ((navigator.maxTouchPoints || 0) > 0);
      }

      function isPhoneUserAgent() {
        var ua = getUserAgent();

        return /iPhone|iPod|Windows Phone|IEMobile|BlackBerry|Opera Mini/i.test(ua) ||
          /Android.*Mobile/i.test(ua) ||
          /Mobile/i.test(ua);
      }

      function isTabletUserAgent() {
        var ua = getUserAgent();
        return /iPad|Tablet|Android(?!.*Mobile)|Silk/i.test(ua);
      }

      function shouldUseMobile() {
        var width = getViewportWidth();
        return isPhoneUserAgent() || width <= MOBILE_BREAKPOINT;
      }

      function isIeMode() {
        var ua = getUserAgent();
        return !!document.documentMode || /MSIE|Trident/i.test(ua);
      }

      function getQueryValue(name) {
        var query = window.location.search || "";
        var match;

        if (window.URLSearchParams) {
          return new URLSearchParams(query).get(name) || "";
        }

        match = new RegExp("[?&]" + name + "=([^&]*)", "i").exec(query);
        return match ? decodeURIComponent(match[1].replace(/\+/g, " ")) : "";
      }

      function hasQueryFlag(flagName) {
        var query = window.location.search || "";
        var value;
        var pattern;

        if (window.URLSearchParams) {
          value = new URLSearchParams(query).get(flagName);
          return new URLSearchParams(query).has(flagName) &&
            (value === null || value === "" || value === "1" || /^true$/i.test(value));
        }

        pattern = new RegExp("[?&]" + flagName + "(=1|=true|&|$)", "i");
        return pattern.test(query);
      }

      function forcedLayout() {
        var value = getQueryValue("force") || getQueryValue("view") || "auto";
        value = value.toLowerCase();

        if (value === "mobile") {
          return "mobile";
        }

        if (value === "desktop") {
          return "desktop";
        }

        return "auto";
      }

      function getAutoLayout() {
        return shouldUseMobile() ? "mobile" : "desktop";
      }

      function getTargetUrl() {
        var force = forcedLayout();

        if (force === "mobile") {
          return MOBILE_URL;
        }

        if (force === "desktop") {
          return DESKTOP_URL;
        }

        return shouldUseMobile() ? MOBILE_URL : DESKTOP_URL;
      }

      function getSelectedLayout(targetUrl) {
        if (targetUrl === MOBILE_URL) {
          return "mobile";
        }

        if (targetUrl === DESKTOP_URL) {
          return "desktop";
        }

        return "unknown";
      }

      function getRouteReason() {
        var force = forcedLayout();

        if (force === "mobile") return "forced_mobile";
        if (force === "desktop") return "forced_desktop";
        if (isPhoneUserAgent()) return "phone_user_agent";
        if (getViewportWidth() <= MOBILE_BREAKPOINT) return "narrow_viewport";

        return "desktop_viewport";
      }

      function getRouteReasonDetail() {
        return "width=" + getViewportWidth() + "; phoneUA=" + (isPhoneUserAgent() ? "true" : "false") + "; forced=" + forcedLayout();
      }

      function getDeviceType() {
        var width = getViewportWidth();

        if (isPhoneUserAgent()) {
          return "phone";
        }

        if (isTabletUserAgent()) {
          return "tablet";
        }

        if (hasTouch() && width <= MOBILE_BREAKPOINT) {
          return "small-touch-screen";
        }

        if (width <= MOBILE_BREAKPOINT) {
          return "narrow-screen";
        }

        return "desktop";
      }

      function getBrowserFamily() {
        var ua = getUserAgent();

        if (/SamsungBrowser/i.test(ua)) return "Samsung Internet";
        if (/Edg/i.test(ua)) return "Edge";
        if (/OPR|Opera/i.test(ua)) return "Opera";
        if (/Chrome|CriOS/i.test(ua)) return "Chrome";
        if (/Firefox|FxiOS/i.test(ua)) return "Firefox";
        if (/Safari/i.test(ua) && !/Chrome|CriOS/i.test(ua)) return "Safari";
        if (/MSIE|Trident/i.test(ua)) return "Internet Explorer";

        return "Other";
      }

      function getBrowserBrand() {
        var ua = getUserAgent();

        if (/SamsungBrowser/i.test(ua)) return "Samsung Internet";
        if (/Edg/i.test(ua)) return "Microsoft Edge";
        if (/OPR|Opera/i.test(ua)) return "Opera";
        if (/CriOS/i.test(ua)) return "Chrome iOS";
        if (/Chrome/i.test(ua)) return "Chrome";
        if (/FxiOS/i.test(ua)) return "Firefox iOS";
        if (/Firefox/i.test(ua)) return "Firefox";
        if (/Safari/i.test(ua) && !/Chrome|CriOS/i.test(ua)) return "Safari";
        if (/MSIE|Trident/i.test(ua)) return "Internet Explorer";

        return "Other";
      }

      function getBrowserEngine() {
        var ua = getUserAgent();

        if (/MSIE|Trident/i.test(ua)) return "Trident";
        if (/Firefox|FxiOS/i.test(ua)) return "Gecko";
        if (/AppleWebKit/i.test(ua) && /Chrome|CriOS|Edg|SamsungBrowser|OPR/i.test(ua)) return "Blink";
        if (/AppleWebKit/i.test(ua) || /Safari/i.test(ua)) return "WebKit";

        return "unknown";
      }

      function getBrowserMajorVersion() {
        var ua = getUserAgent();
        var match = /SamsungBrowser\/(\d+)/i.exec(ua) || /Edg\/(\d+)/i.exec(ua) || /Chrome\/(\d+)/i.exec(ua) || /CriOS\/(\d+)/i.exec(ua) || /Firefox\/(\d+)/i.exec(ua) || /Version\/(\d+)/i.exec(ua);
        return match && match[1] ? match[1] : "";
      }

      function getOsFamily() {
        var ua = getUserAgent();

        if (/Windows/i.test(ua)) return "Windows";
        if (/Android/i.test(ua)) return "Android";
        if (/iPhone|iPad|iPod/i.test(ua)) return "iOS";
        if (/Macintosh|Mac OS X/i.test(ua)) return "macOS";
        if (/Linux/i.test(ua)) return "Linux";

        return "Other";
      }

      function getOsVersionHint() {
        var ua = getUserAgent();
        var match = /Android\s+([0-9.]+)/i.exec(ua) || /OS\s+([0-9_]+)/i.exec(ua) || /Windows NT\s+([0-9.]+)/i.exec(ua) || /Mac OS X\s+([0-9_]+)/i.exec(ua);
        return match && match[1] ? match[1].replace(/_/g, ".") : "";
      }

      function getTimezone() {
        try {
          if (window.Intl && Intl.DateTimeFormat) {
            return Intl.DateTimeFormat().resolvedOptions().timeZone || "";
          }
        } catch (error) {}

        return "";
      }

      function getMediaPreference(query, trueValue, falseValue) {
        try {
          if (window.matchMedia && window.matchMedia(query).matches) {
            return trueValue;
          }
        } catch (error) {}

        return falseValue;
      }

      function getColorScheme() {
        if (getMediaPreference("(prefers-color-scheme: dark)", "dark", "") === "dark") return "dark";
        if (getMediaPreference("(prefers-color-scheme: light)", "light", "") === "light") return "light";
        if (getMediaPreference("(prefers-color-scheme: no-preference)", "no-preference", "") === "no-preference") return "no-preference";
        return "unknown";
      }

      function getForcedColors() {
        if (getMediaPreference("(forced-colors: active)", "active", "") === "active") return "active";
        if (getMediaPreference("(forced-colors: none)", "none", "") === "none") return "none";
        return "unknown";
      }

      function getPrefersContrast() {
        if (getMediaPreference("(prefers-contrast: more)", "more", "") === "more") return "more";
        if (getMediaPreference("(prefers-contrast: less)", "less", "") === "less") return "less";
        if (getMediaPreference("(prefers-contrast: no-preference)", "no-preference", "") === "no-preference") return "no-preference";
        return "unknown";
      }

      function getInvertedColors() {
        if (getMediaPreference("(inverted-colors: inverted)", "inverted", "") === "inverted") return "inverted";
        if (getMediaPreference("(inverted-colors: none)", "none", "") === "none") return "none";
        return "unknown";
      }

      function getConnectionType() {
        var connection = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
        return connection && connection.effectiveType ? connection.effectiveType : "";
      }

      function getAllowedQueryParams() {
        var allowed = ["force", "view", "debug", "utm_source", "utm_medium", "utm_campaign", "utm_content", "utm_term"];
        var result = {};
        var i;
        var key;
        var value;

        for (i = 0; i < allowed.length; i += 1) {
          key = allowed[i];
          value = getQueryValue(key);

          if (value) {
            result[key] = value;
          }
        }

        return result;
      }

      function makeRequestId() {
        if (window.crypto && crypto.randomUUID) {
          return crypto.randomUUID();
        }

        return "req-" + String(Date.now()) + "-" + Math.random().toString(16).slice(2);
      }

      function copyPayload(payload, trackingMethod) {
        var copy = {};
        var key;

        for (key in payload) {
          if (Object.prototype.hasOwnProperty.call(payload, key)) {
            copy[key] = payload[key];
          }
        }

        copy.trackingMethod = trackingMethod;
        return copy;
      }

      function buildTrackingPayload(targetUrl, eventType, countAsVisit) {
        var selectedLayout = getSelectedLayout(targetUrl);
        var force = forcedLayout();

        return {
          schemaVersion: "6",
          eventType: eventType || "router_redirect",
          countAsVisit: !!countAsVisit,
          eventId: makeRequestId(),
          requestId: makeRequestId(),
          dashboardKey: DASHBOARD_KEY,
          dashboardId: DASHBOARD_ID,
          dashboardName: DASHBOARD_NAME,
          publicCardTitle: PUBLIC_CARD_TITLE,
          publicEntryPage: PUBLIC_ENTRY_PAGE,
          selectedLayout: selectedLayout,
          autoSelectedLayout: getAutoLayout(),
          forcedLayout: force,
          forcedLayoutApplied: force !== "auto",
          routeReason: getRouteReason(),
          routeReasonDetail: getRouteReasonDetail(),
          deviceClass: getDeviceType(),
          browserFamily: getBrowserFamily(),
          browserBrand: getBrowserBrand(),
          browserEngine: getBrowserEngine(),
          browserMajorVersion: getBrowserMajorVersion(),
          osFamily: getOsFamily(),
          osVersionHint: getOsVersionHint(),
          viewportWidth: getViewportWidth(),
          viewportHeight: getViewportHeight(),
          screenWidth: window.screen ? screen.width : null,
          screenHeight: window.screen ? screen.height : null,
          devicePixelRatio: window.devicePixelRatio || 1,
          touch: hasTouch(),
          maxTouchPoints: navigator.maxTouchPoints || 0,
          language: navigator.language || "",
          languages: navigator.languages ? navigator.languages.slice(0, 5).join(",") : "",
          timezone: getTimezone(),
          colorScheme: getColorScheme(),
          forcedColors: getForcedColors(),
          prefersContrast: getPrefersContrast(),
          invertedColors: getInvertedColors(),
          connectionType: getConnectionType(),
          referrer: document.referrer || "",
          pageHost: window.location.host,
          pagePath: window.location.pathname,
          pageUrl: window.location.origin + window.location.pathname,
          configVersion: CONFIG_VERSION,
          routerCoreVersion: ROUTER_CORE_VERSION,
          configSource: "embedded-router-v1",
          safeFallbackUsed: false,
          query: getAllowedQueryParams(),
          userAgent: getUserAgent(),
          eventTimeClient: new Date().toISOString()
        };
      }

      function sendTracking(payload) {
        var body;
        var blob;
        var queued;

        if (!TRACKING_ENABLED || !TRACKING_ENDPOINT) {
          return;
        }

        try {
          if (navigator.sendBeacon) {
            body = JSON.stringify(copyPayload(payload, "sendBeacon"));
            blob = new Blob([body], { type: "text/plain;charset=UTF-8" });
            queued = navigator.sendBeacon(TRACKING_ENDPOINT, blob);

            if (queued) {
              return;
            }
          }

          if (window.fetch) {
            body = JSON.stringify(copyPayload(payload, "fetchKeepalive"));
            fetch(TRACKING_ENDPOINT, {
              method: "POST",
              mode: "no-cors",
              keepalive: true,
              headers: {
                "Content-Type": "text/plain;charset=UTF-8"
              },
              body: body
            }).catch(function () {});
          }
        } catch (error) {}
      }

      function updateFallback(targetUrl) {
        var fallbackLink = document.getElementById("fallback-link");
        var routeNote = document.getElementById("route-note");
        var selectedLayout = getSelectedLayout(targetUrl);

        if (fallbackLink) {
          fallbackLink.href = targetUrl;
          fallbackLink.onclick = function () {
            sendTracking(buildTrackingPayload(targetUrl, "fallback_click", false));
          };
        }

        if (routeNote && hasQueryFlag("debug")) {
          routeNote.innerHTML =
            "Debug:<br>" +
            "Mælaborð: " + DASHBOARD_NAME + "<br>" +
            "Valin útgáfa: " + selectedLayout + "<br>" +
            "Tæki: " + getDeviceType() + "<br>" +
            "Skjábreidd: " + getViewportWidth() + " px<br>" +
            "Vafri: " + getBrowserBrand() + " / " + getBrowserEngine() + "<br>" +
            "Stýrikerfi: " + getOsFamily() + "<br>" +
            "Dark mode: " + getColorScheme() + "<br>" +
            "Tracking: " + (TRACKING_ENABLED && TRACKING_ENDPOINT ? "virkt" : "óvirkt / endpoint vantar");
        }
      }

      function redirectToReport() {
        var targetUrl = getTargetUrl();
        var debugMode = hasQueryFlag("debug");

        updateFallback(targetUrl);

        // Add ?debug=1 to the GitHub Pages URL to inspect the routing page without redirecting.
        // Debug visits are not counted unless TRACK_DEBUG_VISITS is changed to true.
        if (!debugMode || TRACK_DEBUG_VISITS) {
          sendTracking(buildTrackingPayload(targetUrl, debugMode ? "router_debug_view" : "router_redirect", !debugMode));
        }

        if (debugMode) {
          return;
        }

        // Hidden Edge IE mode fallback. No visible text, just tries to escape the old rendering engine.
        if (isIeMode() && /^https:\/\//i.test(targetUrl)) {
          window.location.href = "microsoft-edge:" + targetUrl;
          return;
        }

        window.location.replace(targetUrl);
      }

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", redirectToReport);
      } else {
        redirectToReport();
      }
    })();
  </script>
</body>
</html>
