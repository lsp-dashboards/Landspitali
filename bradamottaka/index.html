<!doctype html>
<html lang="is">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="robots" content="noindex, nofollow">
  <title>Opna mælaborð | Bráðamóttaka í Fossvogi</title>

  <style>
    :root {
      --lsp-blue: #4F6F8F;
      --lsp-blue-dark: #30475d;
      --lsp-ink: #102033;
      --lsp-muted: #5f6f82;
      --lsp-line: #d9e1e8;
      --lsp-soft: #f4f7fa;
      --lsp-card: #ffffff;
      --lsp-teal: #226d68;
      color-scheme: light;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--lsp-ink);
      background:
        radial-gradient(circle at top left, rgba(79, 111, 143, 0.13), transparent 28rem),
        linear-gradient(180deg, #f8fbfd 0%, var(--lsp-soft) 100%);
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-width: 0;
      overflow-x: hidden;
    }

    .page {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(100%, 620px);
      margin: 0 auto;
      padding: 22px;
      background: rgba(255, 255, 255, 0.97);
      border: 1px solid var(--lsp-line);
      border-radius: 24px;
      box-shadow: 0 18px 46px rgba(16, 32, 51, 0.11);
      text-align: center;
    }

    .brand-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 22px;
    }

    .brand-label {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      color: var(--lsp-blue-dark);
      font-size: 14px;
      font-weight: 800;
      text-align: left;
    }

    .brand-dot {
      width: 34px;
      height: 34px;
      border: 1px solid rgba(217, 225, 232, 0.94);
      border-radius: 12px;
      background: #ffffff;
      display: grid;
      place-items: center;
      overflow: hidden;
      flex: 0 0 auto;
    }

    .brand-dot img {
      width: 26px;
      height: 26px;
      object-fit: contain;
      display: block;
    }

    .logo {
      width: min(138px, 38vw);
      height: auto;
      display: block;
      flex: 0 0 auto;
    }

    .dashboard-icon {
      width: 92px;
      height: 92px;
      margin: 2px auto 16px;
      border-radius: 24px;
      object-fit: cover;
      border: 1px solid rgba(217, 225, 232, 0.94);
      background: #eef4f8;
      box-shadow: 0 9px 22px rgba(16, 32, 51, 0.08);
      display: block;
    }

    .eyebrow {
      margin: 0 0 10px 0;
      color: var(--lsp-teal);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.045em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      color: var(--lsp-blue-dark);
      font-size: clamp(26px, 6vw, 36px);
      line-height: 1.05;
      letter-spacing: -0.025em;
    }

    .text {
      margin: 14px auto 0;
      max-width: 470px;
      color: var(--lsp-muted);
      font-size: 16px;
      line-height: 1.55;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      margin-top: 22px;
      padding: 14px 20px;
      border: 1px solid var(--lsp-blue);
      border-radius: 14px;
      color: #ffffff;
      background: var(--lsp-blue);
      font-size: 16px;
      font-weight: 800;
      line-height: 1;
      text-decoration: none;
      box-shadow: 0 10px 24px rgba(79, 111, 143, 0.25);
    }

    .button:hover,
    .button:focus-visible {
      background: #435F7A;
    }

    .button:focus-visible,
    .secondary-button:focus-visible {
      outline: 3px solid rgba(34, 109, 104, 0.32);
      outline-offset: 3px;
    }

    .small {
      margin-top: 16px;
      color: #7a8795;
      font-size: 13px;
      line-height: 1.45;
    }

    .router-extra[hidden] {
      display: none;
    }

    .debug-list {
      max-width: 470px;
      margin: 18px auto 0 auto;
      display: grid;
      grid-template-columns: max-content 1fr;
      gap: 8px 12px;
      text-align: left;
      color: var(--lsp-muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .debug-list dt {
      margin: 0;
      color: var(--lsp-ink);
      font-weight: 800;
    }

    .debug-list dd {
      margin: 0;
      min-width: 0;
      word-break: break-word;
    }

    .manual-links {
      margin-top: 18px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
    }

    .secondary-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      padding: 10px 14px;
      border: 1px solid var(--lsp-line);
      border-radius: 12px;
      color: var(--lsp-blue);
      background: #ffffff;
      font-size: 13px;
      font-weight: 800;
      text-decoration: none;
    }

    .secondary-button:hover,
    .secondary-button:focus {
      border-color: var(--lsp-blue);
    }

    @media (max-width: 520px) {
      .page {
        padding: 12px;
      }

      .card {
        padding: 16px;
        border-radius: 20px;
      }

      .brand-row {
        align-items: flex-start;
      }

      .dashboard-icon {
        width: 78px;
        height: 78px;
        border-radius: 20px;
      }

      .button {
        width: 100%;
      }
    }

  </style>
</head>

<body>

          <span>Landspítali</span>
        </div>
        <img class="logo" src="https://images.ctfassets.net/8k0h54kbe6bj/6PHUWW83ZRNXU0ydxQsipf/6f460fab1a36daf4c6faf4e604b4741a/Logo.png" alt="Landspítali" width="138" height="43" loading="eager" decoding="async">
      </div>

      <img class="dashboard-icon" src="https://images.ctfassets.net/8k0h54kbe6bj/68Ef7p57VqG1aYv99GbzB0/3b98fe5c7b3b11c7d01194a7e9caccd6/bradamottaka-linkimage.png?w=774&fm=webp&q=80" alt="" width="92" height="92" loading="eager" decoding="async" onerror="this.onerror=null;this.src='https://images.ctfassets.net/8k0h54kbe6bj/6PHUWW83ZRNXU0ydxQsipf/6f460fab1a36daf4c6faf4e604b4741a/Logo.png';">

</body>
</html>
