<!doctype html>
<html lang="is">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="robots" content="noindex, nofollow">
  <title>Opna mælaborð | Bráðamóttaka í Fossvogi</title>

  <style>
    :root {
      --bg: #f4f7fa;
      --panel: #ffffff;
      --ink: #102033;
      --muted: #617287;
      --line: #d9e1e8;
      --accent: #4F6F8F;
      --accent-dark: #435F7A;
      --accent-soft: #eaf1f7;
      --shadow: 0 16px 45px rgba(16, 32, 51, 0.10);
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(79, 111, 143, .14), transparent 28rem),
        var(--bg);
    }

    * { box-sizing: border-box; min-width: 0; }

    .page {
      min-height: 100vh;
      display: table;
      width: 100%;
      padding: 24px;
    }

    .page-inner {
      display: table-cell;
      vertical-align: middle;
      text-align: center;
    }

    .card {
      max-width: 620px;
      margin: 0 auto;
      padding: 28px 24px 26px;
      background: rgba(255, 255, 255, .96);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: var(--shadow);
    }

    .brand-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 20px;
    }

    .brand-logo {
      width: 112px;
      height: auto;
      display: block;
      flex: 0 0 auto;
    }

    .dashboard-icon {
      width: 58px;
      height: 58px;
      object-fit: cover;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #f8fbfd;
      flex: 0 0 auto;
    }

    .eyebrow {
      margin: 0 0 9px 0;
      color: var(--accent);
      font-size: 13px;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(27px, 5vw, 38px);
      line-height: 1.08;
      letter-spacing: -.035em;
    }

    .text {
      margin: 14px auto 0 auto;
      max-width: 48ch;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.55;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 50px;
      margin-top: 22px;
      padding: 14px 22px;
      border-radius: 15px;
      color: #ffffff;
      background: var(--accent);
      font-size: 16px;
      font-weight: 900;
      text-decoration: none;
      box-shadow: 0 10px 24px rgba(79, 111, 143, 0.25);
    }

    .button:hover,
    .button:focus { background: var(--accent-dark); }
    .button:focus-visible, .secondary-button:focus-visible { outline: 3px solid rgba(79, 111, 143, .30); outline-offset: 3px; }

    .small {
      margin-top: 16px;
      color: #7a8795;
      font-size: 13px;
      line-height: 1.45;
    }

    .router-extra[hidden] { display: none; }

    .debug-list {
      max-width: 470px;
      margin: 18px auto 0 auto;
      display: grid;
      grid-template-columns: max-content 1fr;
      gap: 8px 12px;
      text-align: left;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .debug-list dt { margin: 0; color: var(--ink); font-weight: 900; }
    .debug-list dd { margin: 0; min-width: 0; word-break: break-word; }

    .manual-links {
      margin-top: 18px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
    }

    .secondary-button {
      display: inline-block;
      padding: 10px 14px;
      border: 1px solid var(--line);
      border-radius: 12px;
      color: var(--accent);
      background: #ffffff;
      font-size: 13px;
      font-weight: 800;
      text-decoration: none;
    }

    .secondary-button:hover,
    .secondary-button:focus { border-color: var(--accent); }

    @media (max-width: 540px) {
      .page { padding: 14px; }
      .card { padding: 20px 16px; border-radius: 18px; }
      .brand-row { align-items: flex-start; }
      .brand-logo { width: 96px; }
      .dashboard-icon { width: 50px; height: 50px; border-radius: 14px; }
    }
  </style>
</head>

<body>
  <main class="page">
    <div class="page-inner">
      <section class="card" aria-labelledby="page-title">
        <div class="brand-row">
          <img class="dashboard-icon" src="https://images.ctfassets.net/8k0h54kbe6bj/68Ef7p57VqG1aYv99GbzB0/3b98fe5c7b3b11c7d01194a7e9caccd6/bradamottaka-linkimage.png?w=774&fm=webp&q=80" alt="" decoding="async">
          <img class="brand-logo" src="https://images.ctfassets.net/8k0h54kbe6bj/6PHUWW83ZRNXU0ydxQsipf/6f460fab1a36daf4c6faf4e604b4741a/Logo.png" alt="Landspítali" decoding="async">
        </div>
        <p class="eyebrow">Landspítali</p>
        <h1 id="page-title">Bráðamóttaka í Fossvogi</h1>
        <p class="text">
          Augnablik, þú ert send/ur í rétta útgáfu mælaborðsins eftir tæki og skjábreidd.
        </p>

        <!-- Mobile URL is the safe fallback. If JavaScript or central assets fail, users still get the mobile version. -->
        <a id="fallback-link" class="button" href="https://app.powerbi.com/view?r=eyJrIjoiNGZlODE2N2ItYzkwZS00ZWYzLTg2YzctMjg5NWY5MmU1NTkyIiwidCI6ImUxMDExZTUyLTcyMTAtNDAxNy05NTBmLTQ1ODA3NWY5Zjg0ZSIsImMiOjh9">
          Opna mælaborð
        </a>

        <p id="route-note" class="small">
          Ef ekkert gerist sjálfkrafa skaltu smella á takkann.
        </p>

        <div id="router-extra" class="router-extra" hidden></div>
      </section>
    </div>
  </main>

  <noscript>
    <meta http-equiv="refresh" content="0;url=https://app.powerbi.com/view?r=eyJrIjoiNGZlODE2N2ItYzkwZS00ZWYzLTg2YzctMjg5NWY5MmU1NTkyIiwidCI6ImUxMDExZTUyLTcyMTAtNDAxNy05NTBmLTQ1ODA3NWY5Zjg0ZSIsImMiOjh9">
  </noscript>

    };
  </script>
  <script src="/Landspitali/assets/router-config.prod.js?v=20260613-relaunch1"></script>
  <script src="/Landspitali/assets/router-core.prod.js?v=20260613-relaunch1"></script>
</body>
</html>
